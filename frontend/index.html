<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>

body{
    margin:0;
    /* background:#111; */
}

#container{
    position:relative;
    width:fit-content;
}

video,
canvas{
    position:absolute;
    top:0;
    left:0;
}

canvas{
    pointer-events:none;
}

#fps {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: lime;
    padding: 8px;
    font-family: monospace;
    font-size: 18px;
    z-index: 9999;
}

</style>
</head>

<body>

<div id="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
</div>
<div id="fps">FPS counter</div>

<script type="module" src="./main.js"></script>

</body>
</html>
